services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/neo4j  # username/password — change NEO4J_LOCAL_PASSWORD in .env.local to match
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
